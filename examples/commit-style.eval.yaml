# Example suite (illustrative). A made-up `commit-style` skill that writes
# conventional commit messages following the team's rules.
skill: commit-style
model: sonnet
trials: 5

cases:
  # -- happy: should fire and produce a conventional commit ----------------
  - id: happy-staged-changes
    prompt: "Write a commit message for the staged changes"
    should_trigger: true
    expect:
      - triggered
      - match: "(feat|fix|refactor|chore|docs|test)(\\(.+\\))?:"

  - id: happy-bugfix
    prompt: "I fixed the null check in the payment handler — commit message please"
    should_trigger: true
    expect:
      - triggered
      - match: "fix(\\(.+\\))?:"
      # Happy cases with match/absent/judge are also what `skillevel bench
      # commit-style` A/Bs (skill-on vs skill-off) to measure the skill's lift:
      # - judge: "Is the subject line imperative mood and 72 characters or fewer?"

  # -- negative: near-misses that must NOT fire ----------------------------
  - id: neg-explain-format
    prompt: "What's the difference between feat and fix in conventional commits?"
    should_trigger: false

  - id: neg-undo-commit
    prompt: "How do I undo my last commit but keep the changes?"
    should_trigger: false

  # -- routing: the sibling skill must win, this one must stay out ---------
  - id: collision-pr-description
    prompt: "Draft a description for this pull request"
    expect_skill: pr-desc

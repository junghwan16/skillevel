# code-review.eval.yaml — a REAL, executed example.
#
# Targets the real, widely-installed `code-review` skill (two-axis review —
# Standards + Spec — of the diff since a fixed point). Produced by dogfooding
# skillevel: `new` → real cases → `lint` → paid `claude -p` runs.
#
# Trigger boundary (from the skill's description): "Use when the user wants to
# review a branch, a PR, work-in-progress changes, or asks to 'review since X'."
# Sibling collisions guarded below: diagnosing-bugs, changelog.
#
# CAVEAT worth knowing: code-review only fires when there is something to
# review. The same happy prompt triggered 1/1 inside a git repo with a real
# diff, but `fired: none` in an empty directory. Triggering is cwd/repo-state
# sensitive — run repo-context suites from a repo with actual changes.

skill: code-review
trials: 3
model: sonnet

cases:
  # -- happy (should fire) -------------------------------------------------
  - id: happy-review-branch
    prompt: "Review my feature branch against main before I open the PR."
    should_trigger: true
    expect:
      - triggered
      - match: "standards|spec" # skill reports under ## Standards / ## Spec
      # This `judge` case is also what `skillevel bench code-review` A/Bs.
      - judge: >
          Does the response treat this as a review of the changes since a
          fixed reference point, organized around two axes (coding standards
          AND matching the spec/requirements) rather than a single free-form
          code critique?

  - id: happy-review-pr
    prompt: "Can you review this pull request?"
    should_trigger: true
    expect:
      - triggered

  - id: happy-review-since-tag
    prompt: "Review the changes since the v2.1.0 tag."
    should_trigger: true
    expect:
      - triggered

  - id: happy-review-wip
    prompt: "Review my work-in-progress changes since HEAD~3."
    should_trigger: true
    expect:
      - triggered

  # -- negative (must NOT fire — near-miss) --------------------------------
  - id: neg-explain-merge-base
    prompt: "Explain what a git merge-base is and how a three-dot diff uses it."
    should_trigger: false
    expect:
      - not_triggered

  - id: neg-implement-feature
    prompt: "Add input validation to the login handler so empty passwords are rejected."
    should_trigger: false
    expect:
      - not_triggered

  - id: neg-explain-diff
    prompt: "Walk me through what this diff changes so I understand it."
    should_trigger: false
    expect:
      - not_triggered

  - id: neg-commit-message
    prompt: "Write a commit message for my staged changes."
    should_trigger: false
    expect:
      - not_triggered

  # -- routing: a sibling must win; code-review must stay out ---------------
  - id: route-diagnose-bug
    prompt: "Diagnose why this test throws a NullPointerException when I run the suite."
    expect_skill: diagnosing-bugs

  - id: route-changelog
    prompt: "Draft release notes from the merges since the last release."
    expect_skill: changelog

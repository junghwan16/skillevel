# writing-skills.eval.yaml — a REAL, executed example.
#
# Unlike commit-style.eval.yaml (an illustrative made-up skill), this suite
# targets a real, widely-installed community skill and was produced by
# dogfooding skillevel end-to-end: `skillevel new writing-skills`, then real
# cases, `lint`, and paid `claude -p` runs. happy-1 and route-eval-1 were run
# with `-m sonnet` and passed (2/2 each). See examples/README.md.
#
# The point of this suite is the routing collision it pins down:
#   writing-skills = help me AUTHOR / audit a SKILL.md (triggering description,
#     500-line limit, progressive disclosure, negative triggers).
#   skill-eval (sibling) = help me TEST a skill (happy/negative prompts,
#     trials, LLM judge, ablation).
#   `expect_skill: skill-eval` passes only if skill-eval actually fires AND
#   writing-skills stays out — so a green routing case proves the boundary,
#   not just that the target kept quiet.
#
# Runnable only if both skills are installed (~/.claude/skills). If not, treat
# this as a reading example of a well-shaped suite.

skill: writing-skills
trials: 3
model: sonnet

cases:
  # -- happy (should fire) ---------------------------------------------------
  - id: happy-1
    prompt: "I'm authoring a new SKILL.md but the skill never fires. How should I write the description so it actually triggers?"
    should_trigger: true
    expect:
      - triggered
      - match: "(description|trigger|when)"

  - id: happy-2
    prompt: "Audit my SKILL.md for me — it's about 780 lines long and covers AWS and GCP deploy in the same file. Is that a problem and how do I fix it?"
    should_trigger: true
    expect:
      - triggered
      # This `judge` case is also what `skillevel bench writing-skills` A/Bs.
      - judge: "Does the response advise keeping SKILL.md under ~500 lines and moving the branching detail (e.g. AWS vs GCP) into a references/ file (progressive disclosure)?"

  - id: happy-3
    prompt: "My skill over-fires on prompts it has nothing to do with. How do I stop it triggering when it shouldn't?"
    should_trigger: true
    expect:
      - triggered
      - match: "(negative|narrow|scope|when not)"

  # -- negative (must NOT fire — near-miss) ----------------------------------
  - id: neg-1
    prompt: "Write a docstring for this Python function I just finished."
    should_trigger: false
    expect:
      - not_triggered

  - id: neg-2
    prompt: "How do I install a community skill into ~/.claude/skills?"
    should_trigger: false
    expect:
      - not_triggered

  - id: neg-3 # mentions SKILL.md, but reading/summarizing is not authoring
    prompt: "Read this SKILL.md and summarize in two sentences what the skill does."
    should_trigger: false
    expect:
      - not_triggered

  # -- routing: the sibling must win; writing-skills must stay out -----------
  - id: route-eval-1
    prompt: "My SKILL.md is written. Now help me test whether it actually triggers on the right prompts — set up a few trials per case and check the pass rate."
    expect_skill: skill-eval

  - id: route-eval-2
    prompt: "Run an ablation on my skill: compare the answers with the skill turned on versus off, so I can tell if it's still earning its tokens."
    expect_skill: skill-eval

  # -- routing: nothing should fire -----------------------------------------
  - id: route-none
    prompt: "What's the capital of France?"
    expect_skill: none
